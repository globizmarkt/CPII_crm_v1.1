<!--
============================================================
GADGET  : cpii_contacts / code.html
VERSIÓN : 1.0.0
FECHA   : 2026-05-18
PROPÓSITO: Vista pipeline de contactos CRM.
           Lista contactos desde Firestore via ContactsService.
           Filtro por stage, búsqueda por prefijo, paginación cursor.
           Acciones: cambio de stage, marcar perdido, reactivar.
DEPENDE : window.__CPII__.ContactsService (contacts-service.js)
          window.__CPII__.schema.PIPELINE_STAGES (contacts-schema.js)
DOCTRINA: R0 | R3 | R4 | R5 | Zero-Deps
============================================================
-->
<style>
  .gd-contacts { display:flex; flex-direction:column; gap:1rem; padding:1.5rem; height:100%; box-sizing:border-box; }
  .gd-contacts__toolbar { display:flex; gap:.75rem; align-items:center; flex-wrap:wrap; }
  .gd-contacts__search { flex:1; min-width:180px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-radius:.5rem; padding:.5rem .75rem; color:#e2e8f0; font-size:.8rem; outline:none; }
  .gd-contacts__search:focus { border-color:var(--theme-primary,#8b5cf6); }
  .gd-contacts__filters { display:flex; gap:.35rem; flex-wrap:wrap; }
  .gd-contacts__filter-btn { padding:.3rem .65rem; border-radius:.375rem; font-size:.7rem; font-weight:600; text-transform:uppercase; letter-spacing:.05em; border:1px solid rgba(255,255,255,.12); background:transparent; color:#94a3b8; cursor:pointer; transition:all .15s; }
  .gd-contacts__filter-btn.is-active,.gd-contacts__filter-btn:hover { background:var(--theme-primary,#8b5cf6); border-color:var(--theme-primary,#8b5cf6); color:#fff; }
  .gd-contacts__count { font-size:.7rem; color:#64748b; margin-left:auto; }
  .gd-contacts__table-wrap { flex:1; overflow:auto; border-radius:.5rem; border:1px solid rgba(255,255,255,.07); }
  .gd-contacts__table { width:100%; border-collapse:collapse; font-size:.78rem; }
  .gd-contacts__table th { background:rgba(255,255,255,.04); color:#64748b; font-weight:600; text-transform:uppercase; letter-spacing:.08em; font-size:.65rem; padding:.65rem .9rem; text-align:left; border-bottom:1px solid rgba(255,255,255,.07); position:sticky; top:0; }
  .gd-contacts__table td { padding:.7rem .9rem; border-bottom:1px solid rgba(255,255,255,.04); color:#cbd5e1; vertical-align:middle; }
  .gd-contacts__table tr:hover td { background:rgba(255,255,255,.03); }
  .gd-contacts__table tr:last-child td { border-bottom:none; }
  .gd-stage-badge { display:inline-block; padding:.15rem .5rem; border-radius:.25rem; font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
  .gd-stage--lead_captured    { background:rgba(100,116,139,.25); color:#94a3b8; }
  .gd-stage--contact_initiated{ background:rgba(59,130,246,.2);  color:#93c5fd; }
  .gd-stage--qualified        { background:rgba(16,185,129,.2);  color:#6ee7b7; }
  .gd-stage--presentation     { background:rgba(245,158,11,.2);  color:#fcd34d; }
  .gd-stage--kyc_approved     { background:rgba(139,92,246,.25); color:#c4b5fd; }
  .gd-stage--active_investor  { background:rgba(234,179,8,.25);  color:#fde68a; }
  .gd-stage--lost             { background:rgba(239,68,68,.15);  color:#fca5a5; }
  .gd-contacts__action { background:transparent; border:1px solid rgba(255,255,255,.1); border-radius:.3rem; padding:.2rem .45rem; color:#94a3b8; font-size:.65rem; cursor:pointer; transition:all .15s; }
  .gd-contacts__action:hover { border-color:var(--theme-primary,#8b5cf6); color:#c4b5fd; }
  .gd-contacts__pagination { display:flex; justify-content:space-between; align-items:center; gap:.5rem; }
  .gd-contacts__page-btn { padding:.4rem .9rem; border-radius:.375rem; font-size:.75rem; font-weight:600; border:1px solid rgba(255,255,255,.12); background:transparent; color:#94a3b8; cursor:pointer; transition:all .15s; }
  .gd-contacts__page-btn:hover:not(:disabled) { background:var(--theme-primary,#8b5cf6); color:#fff; border-color:var(--theme-primary,#8b5cf6); }
  .gd-contacts__page-btn:disabled { opacity:.35; cursor:not-allowed; }
  .gd-contacts__empty { text-align:center; padding:3rem 1rem; color:#475569; }
  .gd-contacts__spinner { text-align:center; padding:2rem; color:#64748b; font-size:.8rem; }
  .gd-contacts__error { padding:1rem; color:#fca5a5; font-size:.8rem; background:rgba(239,68,68,.1); border-radius:.5rem; }
  .gd-modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; display:flex; align-items:center; justify-content:center; }
  .gd-modal { background:#1e293b; border:1px solid rgba(255,255,255,.1); border-radius:.75rem; padding:1.5rem; min-width:300px; max-width:420px; width:90%; }
  .gd-modal__title { font-size:.9rem; font-weight:700; color:#e2e8f0; margin-bottom:1rem; }
  .gd-modal__label { font-size:.75rem; color:#94a3b8; margin-bottom:.35rem; display:block; }
  .gd-modal__select,.gd-modal__input { width:100%; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.12); border-radius:.4rem; padding:.5rem .75rem; color:#e2e8f0; font-size:.8rem; margin-bottom:.85rem; }
  .gd-modal__actions { display:flex; gap:.5rem; justify-content:flex-end; margin-top:.5rem; }
  .gd-modal__btn { padding:.45rem .9rem; border-radius:.375rem; font-size:.75rem; font-weight:600; cursor:pointer; border:none; transition:all .15s; }
  .gd-modal__btn--primary { background:var(--theme-primary,#8b5cf6); color:#fff; }
  .gd-modal__btn--cancel  { background:transparent; border:1px solid rgba(255,255,255,.12); color:#94a3b8; }
</style>

<div class="gd-contacts" id="gd-contacts-root">

  <!-- Toolbar -->
  <div class="gd-contacts__toolbar">
    <input type="text" class="gd-contacts__search" id="gd-contacts-search"
           placeholder="Buscar contacto (nombre, email, teléfono)..." autocomplete="off">
    <div class="gd-contacts__filters" id="gd-stage-filters">
      <button class="gd-contacts__filter-btn is-active" data-stage="">Todos</button>
      <!-- stages inyectados por JS -->
    </div>
    <span class="gd-contacts__count" id="gd-contacts-count"></span>
  </div>

  <!-- Table -->
  <div class="gd-contacts__table-wrap" id="gd-contacts-table-wrap">
    <div class="gd-contacts__spinner" id="gd-contacts-spinner">Cargando contactos…</div>
    <table class="gd-contacts__table" id="gd-contacts-table" style="display:none">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Email</th>
          <th>Teléfono</th>
          <th>País</th>
          <th>Stage</th>
          <th>Embajador</th>
          <th>Fecha</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="gd-contacts-tbody"></tbody>
    </table>
    <div class="gd-contacts__empty" id="gd-contacts-empty" style="display:none">
      Sin contactos para este filtro.
    </div>
    <div class="gd-contacts__error" id="gd-contacts-error" style="display:none"></div>
  </div>

  <!-- Pagination -->
  <div class="gd-contacts__pagination" id="gd-contacts-pagination" style="display:none">
    <button class="gd-contacts__page-btn" id="gd-contacts-prev" disabled>← Anterior</button>
    <span style="font-size:.75rem;color:#64748b" id="gd-contacts-page-info"></span>
    <button class="gd-contacts__page-btn" id="gd-contacts-next">Siguiente →</button>
  </div>

</div>

<!-- Stage change modal -->
<div class="gd-modal-backdrop" id="gd-stage-modal" style="display:none">
  <div class="gd-modal">
    <div class="gd-modal__title">Cambiar Stage</div>
    <label class="gd-modal__label">Nuevo stage</label>
    <select class="gd-modal__select" id="gd-modal-stage-select"></select>
    <div class="gd-modal__actions">
      <button class="gd-modal__btn gd-modal__btn--cancel" id="gd-modal-cancel">Cancelar</button>
      <button class="gd-modal__btn gd-modal__btn--primary" id="gd-modal-confirm">Confirmar</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const PAGE_SIZE = 20;
  const STAGE_LABELS = {
    lead_captured:     'Lead Capturado',
    contact_initiated: 'Contacto Iniciado',
    qualified:         'Cualificado',
    presentation:      'Presentación',
    kyc_approved:      'KYC Aprobado',
    active_investor:   'Inversor Activo',
  };

  let currentStage  = '';
  let currentPage   = 1;
  let cursorStack   = [null];   // cursorStack[0] = null (página 1), cursorStack[n] = lastDoc de página n
  let lastDoc       = null;
  let totalShown    = 0;
  let pendingStageContactId = null;
  let searchTimer   = null;

  const $  = id => document.getElementById(id);
  const svc = () => window.__CPII__?.ContactsService;

  // ── Helpers de UI ──────────────────────────────────────────────

  function showSpinner(v) {
    $('gd-contacts-spinner').style.display = v ? 'block' : 'none';
    $('gd-contacts-table').style.display   = v ? 'none'  : '';
    $('gd-contacts-empty').style.display   = 'none';
    $('gd-contacts-error').style.display   = 'none';
  }

  function showError(msg) {
    $('gd-contacts-spinner').style.display = 'none';
    $('gd-contacts-table').style.display   = 'none';
    $('gd-contacts-empty').style.display   = 'none';
    const el = $('gd-contacts-error');
    el.style.display = 'block';
    el.textContent   = '[ContactsGadget] ' + msg;
  }

  function stageBadge(stage, isActive) {
    if (!isActive) stage = 'lost';
    const label = STAGE_LABELS[stage] || stage;
    return `<span class="gd-stage-badge gd-stage--${stage}">${label}</span>`;
  }

  function formatDate(ts) {
    if (!ts) return '—';
    try {
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('es-ES', { day:'2-digit', month:'short', year:'2-digit' });
    } catch { return '—'; }
  }

  // ── Render tabla ───────────────────────────────────────────────

  function renderRows(contacts) {
    const tbody = $('gd-contacts-tbody');
    tbody.innerHTML = '';

    if (!contacts.length) {
      $('gd-contacts-table').style.display = 'none';
      $('gd-contacts-empty').style.display = 'block';
      $('gd-contacts-count').textContent   = '0 contactos';
      $('gd-contacts-pagination').style.display = 'none';
      return;
    }

    contacts.forEach(c => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><strong style="color:#e2e8f0">${c.fullName || c.firstName + ' ' + c.lastName || '—'}</strong></td>
        <td style="color:#94a3b8">${c.email || '—'}</td>
        <td>${c.phone || '—'}</td>
        <td>${c.country || '—'}</td>
        <td>${stageBadge(c.currentStage, c.isActive)}</td>
        <td style="color:#64748b;font-size:.7rem">${c.l1Slug || '—'}</td>
        <td style="color:#475569;font-size:.7rem">${formatDate(c.createdAt)}</td>
        <td>
          ${c.isActive
            ? `<button class="gd-contacts__action" data-action="stage" data-id="${c.id}" data-current="${c.currentStage}">Stage</button>`
            : `<button class="gd-contacts__action" data-action="reactivate" data-id="${c.id}">Reactivar</button>`
          }
        </td>
      `;
      tbody.appendChild(tr);
    });

    $('gd-contacts-table').style.display = '';
    $('gd-contacts-empty').style.display = 'none';
    $('gd-contacts-count').textContent   = `${totalShown} contacto${totalShown !== 1 ? 's' : ''}`;
  }

  // ── Carga de datos ─────────────────────────────────────────────

  async function loadPage(startAfterDoc) {
    const service = svc();
    if (!service) { showError('ContactsService no disponible. Asegúrate de que Firebase está inicializado.'); return; }

    showSpinner(true);
    try {
      const opts = {
        limit:      PAGE_SIZE,
        activeOnly: false,
        startAfter: startAfterDoc || undefined,
      };
      if (currentStage) opts.stage = currentStage;

      const { contacts, lastDoc: newLastDoc } = await service.getAll(opts);

      totalShown = contacts.length;
      lastDoc    = newLastDoc;

      renderRows(contacts);
      showSpinner(false);
      updatePagination(newLastDoc);

    } catch (err) {
      showError(err.message);
    }
  }

  async function runSearch(query) {
    const service = svc();
    if (!service) return;
    if (!query || query.trim().length < 2) { loadPage(null); return; }

    showSpinner(true);
    try {
      const contacts = await service.search(query.trim(), 50);
      totalShown = contacts.length;
      lastDoc    = null;
      renderRows(contacts);
      showSpinner(false);
      $('gd-contacts-pagination').style.display = 'none';
    } catch (err) {
      showError(err.message);
    }
  }

  // ── Paginación ─────────────────────────────────────────────────

  function updatePagination(newLastDoc) {
    const pag = $('gd-contacts-pagination');
    pag.style.display = 'flex';
    $('gd-contacts-prev').disabled = currentPage <= 1;
    $('gd-contacts-next').disabled = !newLastDoc;
    $('gd-contacts-page-info').textContent = `Pág. ${currentPage}`;
  }

  $('gd-contacts-next').addEventListener('click', () => {
    if (!lastDoc) return;
    cursorStack[currentPage] = lastDoc;
    currentPage++;
    loadPage(lastDoc);
  });

  $('gd-contacts-prev').addEventListener('click', () => {
    if (currentPage <= 1) return;
    currentPage--;
    const prevCursor = cursorStack[currentPage - 1] || null;
    loadPage(prevCursor);
  });

  // ── Filtros por stage ──────────────────────────────────────────

  function buildStageFilters() {
    const container = $('gd-stage-filters');
    Object.entries(STAGE_LABELS).forEach(([key, label]) => {
      const btn = document.createElement('button');
      btn.className = 'gd-contacts__filter-btn';
      btn.dataset.stage = key;
      btn.textContent = label;
      container.appendChild(btn);
    });
  }

  $('gd-stage-filters').addEventListener('click', e => {
    const btn = e.target.closest('.gd-contacts__filter-btn');
    if (!btn) return;
    document.querySelectorAll('.gd-contacts__filter-btn').forEach(b => b.classList.remove('is-active'));
    btn.classList.add('is-active');
    currentStage = btn.dataset.stage;
    currentPage  = 1;
    cursorStack  = [null];
    $('gd-contacts-search').value = '';
    loadPage(null);
  });

  // ── Búsqueda ──────────────────────────────────────────────────

  $('gd-contacts-search').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => runSearch(e.target.value), 380);
  });

  // ── Acciones de fila ──────────────────────────────────────────

  $('gd-contacts-tbody').addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const { action, id, current } = btn.dataset;

    if (action === 'stage') {
      pendingStageContactId = id;
      // Poblar select con stages válidos (excepto current)
      const sel = $('gd-modal-stage-select');
      sel.innerHTML = Object.entries(STAGE_LABELS)
        .filter(([k]) => k !== current)
        .map(([k, v]) => `<option value="${k}">${v}</option>`)
        .join('');
      $('gd-stage-modal').style.display = 'flex';
    }

    if (action === 'reactivate') {
      const service = svc();
      if (!service) return;
      const actorUid = window.__CPII__?.session?.uid || 'staff';
      service.reactivate(id, 'contact_initiated', actorUid)
        .then(() => loadPage(cursorStack[currentPage - 1] || null))
        .catch(err => showError('Reactivar: ' + err.message));
    }
  });

  // ── Modal de stage ────────────────────────────────────────────

  $('gd-modal-cancel').addEventListener('click', () => {
    $('gd-stage-modal').style.display = 'none';
    pendingStageContactId = null;
  });

  $('gd-modal-confirm').addEventListener('click', async () => {
    const service  = svc();
    if (!service || !pendingStageContactId) return;
    const newStage  = $('gd-modal-stage-select').value;
    const actorUid  = window.__CPII__?.session?.uid || 'staff';
    $('gd-stage-modal').style.display = 'none';
    try {
      await service.updatePipelineStage(pendingStageContactId, newStage, actorUid);
      pendingStageContactId = null;
      loadPage(cursorStack[currentPage - 1] || null);
    } catch (err) {
      showError('Stage change: ' + err.message);
    }
  });

  // ── Init ──────────────────────────────────────────────────────

  buildStageFilters();

  // Esperar a que Firebase esté listo antes de la primera carga
  if (svc()) {
    loadPage(null);
  } else {
    // Retry hasta 3s (Firebase puede tardar ~1s en auth init)
    let retries = 0;
    const retry = setInterval(() => {
      retries++;
      if (svc()) { clearInterval(retry); loadPage(null); return; }
      if (retries > 15) { clearInterval(retry); showError('ContactsService no disponible tras 3s.'); }
    }, 200);
  }

})();
</script>
